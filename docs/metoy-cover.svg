  <text x="100" y="298" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="650" fill="#647087">A science learning agent for educational toys and hands-on experiments.</text>
  <text x="100" y="342" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600" fill="#647087">GLM + Local RAG + Tool Calling + Explainable Agent Trace</text>

  <g transform="translate(100 382)">
