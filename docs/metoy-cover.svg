<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFF"/>
      <stop offset="0.52" stop-color="#EEF5FF"/>
      <stop offset="1" stop-color="#F4FFFC"/>
    </linearGradient>
    <linearGradient id="brand" x1="170" y1="112" x2="640" y2="380" gradientUnits="userSpaceOnUse">
